<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            align-content: center;
        }

        body {
            background: rgb(120, 96, 64);
            margin-top: 1em;
        }

        #formContainer {
            display: border;
            border: 8px solid rgb(17, 33, 184);
            border-radius: 25px;
            width: 400px;
            aspect-ratio: 3 / 5;
            margin: auto;
            overflow: hidden;
        }

        #headimg {
            width: 385px;
            position: relative;
            z-index: 0;
        }

        h3 {
            background-color: white;
            margin-top: -5em;
            padding: 1em;
            text-align: center;
            z-index: 5;
            position:fixed;
            width: 384px;
        }

        #myForm {
            background: white;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr 1fr 1fr 1fr 1fr 5fr;
            height: 500px;
            gap: 1.5em;
            padding: 1em;
            margin-top: -100px;
            z-index: 2;
            position: relative;
            padding-top: 75px;
        }

        #closeBtn {
            aspect-ratio: 10/8;
            width: 30px;
            position: relative;
            top: -610px;
            left: -2px;
        }

        .un {
            grid-area: 1 / 1 / 2 / 2;
        }

        .uni {
            grid-area: 1 / 2 / 2 / 3;
        }

        .pw {
            grid-area: 2 / 1 / 3 / 2;
        }

        .pwi {
            grid-area: 2 / 2 / 3 / 3;
        }

        .em {
            grid-area: 3 / 1 / 4 / 2;
        }

        .emi {
            grid-area: 3 / 2 / 4 / 3;
        }

        .gd {
            grid-area: 4 / 1 / 5 / 2;
        }

        .gdi {
            grid-area: 4 / 2 / 5 / 3;
        }

        .sub {
            grid-area: 5 / 1 / 6 / 3;
            text-align: center;
        }

        .iak {
            grid-area: 6 / 1 / 7 / 3;
            text-align: center;

        }

        .submitb {
            grid-area: 7 / 1 / 8 / 3;
            text-align: center;
        }

        .books {
            grid-area: 8 / 1 / 9 / 3;
            display: flex;
            gap: 5px;
            overflow: auto;
            padding: -20%;
            padding-left: 9px;
            margin: -7%;
            transform: translateY(45px);
        }


        #cardtitle{
            position: relative;
            text-align: center;
            z-index: 2;
            color: white;
            text-shadow: 2px 2px 0 black;
            font-size: 120%;
            transform: translateY(3.5em);
            height: 0;
        }
    </style>




</head>

<body>
    <div id="formContainer">
        <div id="cardtitle">
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </div>
        <img id="headimg" src="images/jesus_feeds_5000.jpeg" alt="">
        <h3>Sign Up for Daily Scripture Feed</h3>
        
        <form id="myForm">
            <button type="button" id="closeBtn">X</button>
            
            <label class="un" for="username">User Name:</label>
            <input class="uni" type="text" id="username" name="username" required>

            <label class="pw" for="password">Password:</label>
            <input class="pwi" type="password" id="password" name="password" required>

            <label class="em" for="email">Email:</label>
            <input class="emi" type="email" id="email" name="email" required>

            <label class="gd">Gender:</label>
            <div class="gdi">
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section class="sub">
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section class="iak">
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section class="submitb">
                <button type="submit">Submit</button>
            </section>

            <section class="books">
                <img src="images/old_testament.webp" alt="">
                <img src="images/new_testament.webp" alt="">
                <img src="images/book_of_mormon.webp" alt="">
                <img src="images/doctrine_and_covenants.webp" alt="">
                <img src="images/pearl_of_great_price.webp" alt="">
            </section>
        </form>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
